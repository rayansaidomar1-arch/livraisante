function isPharmOpen(p) {
  const h = new Date().getHours();
  return h >= 8 && h < p.closeHour;
}
function getPharmaciesForProduct(product) {
  return PHARMACIES.filter(p => p.brands.includes(product.brand)).sort((a,b) => a.distance - b.distance);
}
function getNearestOpenPharmacy(product) {
  const list = getPharmaciesForProduct(product);
  return list.find(isPharmOpen) || list[0] || PHARMACIES[0];
}

function getRecommendations(query) {
  const words = query.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
    .split(/[\s,'.\-!?]+/).filter(w => w.length > 2);
  const scored = PRODUCTS.map(p => {
    let s = 0;
    const nameN = p.name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    const brandN = p.brand.toLowerCase();
    for (const w of words) {
      if (nameN.includes(w)) s += 10;
      if (brandN.includes(w)) s += 6;
      for (const t of p.tags) {
        const tn = t.normalize('NFD').replace(/[̀-ͯ]/g,'');
        if (tn.includes(w) || w.includes(tn)) s += 3;
      }
      if (p.desc.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').includes(w)) s += 1;
    }
    return { ...p, score: s };
  });
  scored.sort((a,b) => b.score - a.score);
  const with_ = scored.filter(p => p.score > 0);
  if (with_.length >= 3) return with_.slice(0,3);
  const without = scored.filter(p => p.score === 0).sort(() => Math.random() - 0.5);
  return [...with_, ...without].slice(0,3);
}

function getPricing(ppv) {
  const livrePrice = Math.round(ppv * 0.95 * 100) / 100;
  const subPrice   = Math.round(livrePrice * 0.85 * 100) / 100;
  const savings    = Math.round((ppv - livrePrice) * 100) / 100;
  const subSavings = Math.round((ppv - subPrice) * 100) / 100;
  return {
    ppv: ppv.toFixed(2),
    livrePrice: livrePrice.toFixed(2),
    subPrice: subPrice.toFixed(2),
    savings: savings.toFixed(2),
    subSavings: subSavings.toFixed(2),
  };
}

function getSocialProof(id) {
  let h = 0;
  const s = id + new Date().toDateString();
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
  const a = Math.abs(h);
  return { orders: 12 + (a % 38), stock: 3 + (a % 7) };
}

function getDeliveryInfo() {
  const h = new Date().getHours();
  if (h < 17) return { text:`Livré aujourd'hui avant 20h`, sub:`Commandez dans les ${17-h}h`, urgent:true,  icon:'⚡' };
  if (h < 21) return { text:'Livré demain matin avant 10h', sub:'Commandez avant ce soir', urgent:false, icon:'🚚' };
  return       { text:'Livré demain avant midi',        sub:'Livraison express garantie', urgent:false, icon:'🚚' };
}

/* ─── ÉCRAN ANALYSE ───────────────────────────────────────────────── */
function AnalysisScreen({ query, onComplete }) {
  const [done, setDone] = useState([]);
  const [current, setCurrent] = useState(0);
  const STEPS = [
    { label:'Analyse de votre demande', icon:'🔍', detail:`"${query}"` },
    { label:'Vérification des prix PPV', icon:'💰', detail:'Consultation GERS · Ospharm · pharmacie.fr' },
    { label:'Sélection des pharmacies partenaires', icon:'🏥', detail:'Rayon 10 km · stock vérifié en temps réel' },
    { label:'Personnalisation de votre offre', icon:'✨', detail:'Prix optimal calculé avec livraison incluse' },
  ];
  useEffect(() => {
    const recs = getRecommendations(query);
    let step = 0;
    const t = setInterval(() => {
      setDone(d => [...d, step]);
      step++;
      setCurrent(step);
      if (step >= STEPS.length) {
        clearInterval(t);
        setTimeout(() => onComplete(recs), 500);
      }
    }, 780);
    return () => clearInterval(t);
  }, []);

  const pct = (done.length / STEPS.length) * 100;
  return (
    <div className="flex flex-col min-h-screen items-center justify-center px-6 bg-white">
      <div className="text-center mb-10">
        <div className="text-6xl mb-4 confetti">💊</div>
        <h2 className="text-xl font-black text-gray-900">Livraisanté</h2>
        <p className="text-sm text-gray-400 mt-1">Recherche en cours…</p>
      </div>
      <div className="w-full space-y-3">
        {STEPS.map((step, i) => {
          const isDone = done.includes(i);
          const isActive = current === i;
          return (
            <div key={i} className={`flex items-start gap-3 p-3.5 rounded-2xl transition-all duration-400 ${
              isDone ? 'bg-gray-100' : isActive ? 'bg-amber-50' : 'bg-gray-50 opacity-40'
            }`}>
              <div className={`w-9 h-9 rounded-full flex items-center justify-center text-sm font-black flex-shrink-0 ${
                isDone ? 'bg-gray-900 text-white' : isActive ? 'bg-amber-400 text-white pulse' : 'bg-gray-200 text-gray-400'
              }`}>
                {isDone ? '✓' : isActive ? '…' : step.icon}
              </div>
              <div className="flex-1 min-w-0 pt-0.5">
                <p className={`text-sm font-bold ${isDone ? 'text-gray-900' : 'text-gray-700'}`}>{step.label}</p>
                {(isDone || isActive) && <p className="text-xs text-gray-400 mt-0.5 truncate">{step.detail}</p>}
              </div>
            </div>
          );
        })}
      </div>
      <div className="w-full mt-6 bg-gray-100 rounded-full h-1.5 overflow-hidden">
        <div className="bg-gray-900 h-1.5 rounded-full transition-all duration-500" style={{ width: pct+'%' }} />
      </div>
      <p className="mt-3 text-xs text-gray-400 font-medium">{Math.round(pct)}% complété</p>
    </div>
  );
}

      ))}
      <label className="flex items-start gap-2.5 cursor-pointer">
        <input type="checkbox" checked={!!form.cgu} onChange={e=>set('cgu',e.target.checked)} className="mt-0.5 accent-blue-600"/>
        <span className="text-xs text-gray-700">J'accepte les CGU, la convention de partenariat et la politique RGPD de Livraisanté</span>
      </label>
      <div className="flex items-center justify-center gap-4 text-xs text-gray-400">
        <span>🔒 SSL</span><span>·</span><span>🛡️ RGPD</span><span>·</span><span>📄 Facture HT</span>
      </div>
    </div>,
  ];
  return (
    <div className="flex flex-col min-h-screen bg-white">
      <div className="px-5 pt-5 pb-4 flex items-center gap-3 border-b border-gray-100">
        <button onClick={prev} className="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center font-bold text-gray-600 active:bg-gray-200">←</button>
        <div className="flex-1">
          <p className="text-xs text-gray-400">Étape {step+1}/{PHARMA_SIGNUP_STEPS.length}</p>
          <p className="text-sm font-black text-gray-900">{PHARMA_SIGNUP_STEPS[step]}</p>
        </div>
        <span className={`text-xs font-black px-2.5 py-1 rounded-full text-white ${plan?.color||'bg-blue-600'}`}>{plan?.id==='premium'?'Premium':'Essentiel'}</span>
      </div>
      <div className="px-5 pt-3 pb-1"><div className="flex gap-1">{PHARMA_SIGNUP_STEPS.map((_,i)=><div key={i} className={`flex-1 h-1 rounded-full transition-all ${i<=step?'bg-blue-500':'bg-gray-200'}`}/>)}</div></div>
      <div className="flex-1 overflow-y-auto px-5 py-5">{steps[step]}</div>
      <div className="px-5 py-4 border-t border-gray-100">
        <button onClick={next} className={`w-full py-4 text-white font-black rounded-2xl active:opacity-90 ${plan?.color||'bg-blue-600'}`}>
          {step<3?'Continuer →':'✓ Confirmer le paiement'}
        </button>
      </div>
    </div>
  );
}

function PharmacieApp({ onBack }) {
  const [screen, setScreen] = useState('landing');
  const [plan, setPlan] = useState(null);
  if (screen==='landing')   return <PharmacieLanding onPricing={()=>setScreen('pricing')} onDashboard={()=>setScreen('dashboard')} onBack={onBack}/>;
  if (screen==='pricing')   return <PharmaciePricing onSignup={p=>{setPlan(p);setScreen('signup');}} onBack={()=>setScreen('landing')}/>;
  if (screen==='signup')    return <PharmacieSignup plan={plan} onComplete={()=>setScreen('dashboard')} onBack={()=>setScreen('pricing')}/>;
  if (screen==='dashboard') return <PharmacieDashboard onBack={onBack}/>;
  return null;
}

/* ─── APP (routeur) ───────────────────────────────────────────────── */
function App() {
  const [mode, setMode] = useState('selector');
  const [screen, setScreen] = useState('home');
  const [query, setQuery] = useState('');
  const [recs, setRecs] = useState([]);
  const [product, setProduct] = useState(null);
  const [rank, setRank] = useState(0);
  const [isSub, setIsSub] = useState(false);
  const [deliveryMode, setDeliveryMode] = useState('livraison');

  const go = s => setScreen(s);

  const onSearch = q => { setQuery(q); go('analysis'); };
  const onComplete = r => { setRecs(r); go('results'); };
  const onSelect = (p, i) => { setProduct(p); setRank(i); setIsSub(false); go('product'); };
  const onRestart = () => { setQuery(''); setRecs([]); setProduct(null); setIsSub(false); go('home'); };

  const selectMode = m => { setMode(m); setScreen('home'); };
  const backToSelector = () => { setMode('selector'); setScreen('home'); };

  const PATIENT_SCREENS = {
    home:         <HomeScreen onSearch={onSearch} onBack={backToSelector} deliveryMode={deliveryMode} setDeliveryMode={setDeliveryMode} />,
    analysis:     <AnalysisScreen query={query} onComplete={onComplete} />,
    results:      <ResultsScreen query={query} recs={recs} isSubscription={isSub} onSelectProduct={onSelect} onBack={() => go('home')} />,
    product:      product && <ProductScreen product={product} rank={rank} isSubscription={isSub} setIsSubscription={setIsSub} onAddToCart={() => go('payment')} onBack={() => go('results')} deliveryMode={deliveryMode} />,
    payment:      product && <PaymentScreen product={product} isSubscription={isSub} onConfirm={() => go('confirmation')} onBack={() => go('product')} deliveryMode={deliveryMode} />,
    confirmation: product && <ConfirmationScreen product={product} isSubscription={isSub} onRestart={onRestart} deliveryMode={deliveryMode} />,
  };

  return (
    <div className="min-h-screen bg-gray-200 flex items-start justify-center py-0 sm:py-8">
      <div className="w-full max-w-sm min-h-screen bg-white shadow-2xl overflow-hidden relative sm:rounded-3xl sm:min-h-0 sm:max-h-[780px] sm:overflow-y-auto">
        {mode === 'selector'  && <AppSelector onSelect={selectMode} />}
        {mode === 'patient'   && (PATIENT_SCREENS[screen] || PATIENT_SCREENS.home)}
        {mode === 'livreur'   && <LivreurApp onBack={backToSelector} />}
        {mode === 'pharmacie' && <PharmacieApp onBack={backToSelector} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- ── Service Worker + Bannière d'installation PWA ──────────── -->
<script>
/* Enregistrement du Service Worker */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('[SW] Enregistré :', reg.scope))
      .catch(err => console.warn('[SW] Erreur :', err));
  });
}

/* Bannière d'installation "Ajouter à l'écran d'accueil" */
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;

  /* Afficher la bannière après 3 secondes */
  setTimeout(() => {
    const banner = document.getElementById('pwa-install-banner');
    if (banner) banner.style.display = 'flex';
  }, 3000);
});

function installPWA() {
  const banner = document.getElementById('pwa-install-banner');
  if (banner) banner.style.display = 'none';
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(result => {
    console.log('[PWA] Installation :', result.outcome);
    deferredPrompt = null;
  });
}

function dismissInstall() {
  const banner = document.getElementById('pwa-install-banner');
  if (banner) banner.style.display = 'none';
}

/* Masquer la bannière si déjà installée */
window.addEventListener('appinstalled', () => {
  const banner = document.getElementById('pwa-install-banner');
  if (banner) banner.style.display = 'none';
  console.log('[PWA] Application installée avec succès');
});
</script>
